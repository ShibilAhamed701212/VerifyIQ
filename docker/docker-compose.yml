services:
  verifyiq:
    build:
      context: .
      dockerfile: Dockerfile
    image: verifyiq:latest
    container_name: verifyiq
    volumes:
      - ./dataset:/app/dataset:ro
      - ./output:/app/output
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: verifyiq evaluate
    profiles:
      - evaluation

  verifyiq-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: verifyiq:latest
    container_name: verifyiq-api
    ports:
      - "8000:8000"
    volumes:
      - ./dataset:/app/dataset:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: uvicorn verifyiq.api.app:app --host 0.0.0.0 --port 8000
    profiles:
      - api
